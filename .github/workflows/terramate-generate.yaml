name: Terramate Generate

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terramate-generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # SECURITY: This checkout of head.sha is safe ONLY because the trigger
          # is 'pull_request' (unprivileged). NEVER use with 'pull_request_target'.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: "0.14.7"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Find directories and run terramate generate
        run: |
          echo "Found directories:"
          find terraform/terramate -type f -name "*.tm.hcl" -exec dirname {} \; | sort -u

          # Use null-delimited paths to safely handle spaces and newlines
          while IFS= read -r -d '' dir; do
            echo "Running terramate generate in $dir"
            (cd "$dir" && terramate generate)
          done < <(find terraform/terramate -type f -name "*.tm.hcl" -exec dirname {} \; | sort -u | tr '\n' '\0')

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            # Generate diff content
            diff_output=$(git --no-pager diff)
            # Use random delimiter to prevent HEREDOC injection
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            {
              echo "diff_content<<$EOF"
              echo "## Terramate Generate Changes"
              echo ""
              echo "The following files were updated by \`terramate generate\`:"
              echo ""
              echo '```diff'
              echo "$diff_output"
              echo '```'
              echo "$EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment diff on PR
        if: ${{ github.event_name == 'pull_request' && steps.verify-changed-files.outputs.changed == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const diffContent = process.env.DIFF_CONTENT;
            const commentMarker = '<!-- terramate-generate-diff -->';

            // Find and delete existing comments from this workflow
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            for (const comment of comments.data) {
              if (comment.body.includes(commentMarker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            // Add new comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentMarker + '\n' + diffContent
            });
        env:
          DIFF_CONTENT: ${{ steps.verify-changed-files.outputs.diff_content }}

      - name: Commit and push changes
        if: ${{ github.event_name == 'push' && steps.verify-changed-files.outputs.changed == 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-generate Terramate files

          🤖 Generated with terramate generate

          Co-Authored-By: GitHub Action <action@github.com>"
          git push origin main
